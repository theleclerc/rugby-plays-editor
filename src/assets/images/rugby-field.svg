  <!-- Halfway line -->
  <line x1="786.5" y1="25" x2="786.5" y2="1155" stroke="white" stroke-width="6"/>
  
  <!-- 5m lines from touchlines (horizontal) -->
  <line x1="225" y1="93.33" x2="1348" y2="93.33" stroke="white" stroke-width="4" stroke-dasharray="50,60"/>
  <line x1="225" y1="1086.67" x2="1348" y2="1086.67" stroke="white" stroke-width="4" stroke-dasharray="50,60"/>
  
  <!-- 15m lines from touchlines (horizontal) -->
  <line x1="225" y1="230" x2="1348" y2="230" stroke="white" stroke-width="4" stroke-dasharray="50,60"/>
  <line x1="225" y1="950" x2="1348" y2="950" stroke="white" stroke-width="4" stroke-dasharray="50,60"/>
  
  <!-- Goal posts -->
  <line x1="786.5" y1="25" x2="786.5" y2="60" stroke="white" stroke-width="6"/>
  <line x1="761.5" y1="35" x2="811.5" y2="35" stroke="white" stroke-width="6"/>
  
